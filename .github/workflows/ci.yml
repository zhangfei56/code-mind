name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: pnpm
      - name: Verify Node.js version
        run: node -v
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
